<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Explorador + Upload</title>
  <style>
    body { font-family: Arial, sans-serif; }
    ul { list-style-type: none; }
    li { margin: 5px 0; cursor: pointer; }
    li:hover { background: #f0f0f0; }
  </style>
</head>
<body>
  <h2>Archivos del repositorio</h2>
  <ul id="file-list"></ul>

  <h3>Subir archivo</h3>
  <input type="file" id="upload" />

  <script>
    const owner = "gerismusikyt";          // tu usuario
    const repo = "uploads.for.thinks";     // tu repo
    const branch = "main";                 // cambia si tu rama es master
    const token = "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"; // ⚠️ inseguro

    async function fetchRepoContents(path = "") {
      const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`;
      const response = await fetch(url);
      const data = await response.json();

      const list = document.getElementById("file-list");
      list.innerHTML = "";

      if (!Array.isArray(data)) {
        list.innerHTML = "<li>No se pudo cargar el contenido.</li>";
        return;
      }

      data.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item.name;

        if (item.type === "dir") {
          li.style.fontWeight = "bold";
          li.onclick = () => fetchRepoContents(item.path);
        } else {
          li.onclick = () => {
            const rawLink = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${item.path}`;
            navigator.clipboard.writeText(rawLink);
            alert("Copiado: " + rawLink);
          };
        }

        list.appendChild(li);
      });
    }

    // Upload inseguro
    document.getElementById("upload").addEventListener("change", async e => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async () => {
        const content = btoa(reader.result); // convertir a Base64
        const path = file.name;

        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        const response = await fetch(url, {
          method: "PUT",
          headers: {
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: "Subiendo archivo desde página insegura",
            content: content,
            branch: branch
          })
        });

        const data = await response.json();
        if (data.content) {
          const rawLink = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${path}`;
          alert("Archivo subido. Raw link:\n" + rawLink);
          fetchRepoContents(); // refrescar lista
        } else {
          alert("Error al subir: " + JSON.stringify(data));
        }
      };
      reader.readAsBinaryString(file);
    });

    fetchRepoContents();
  </script>
</body>
</html>
