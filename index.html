<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Explorador de Repositorio</title>
  <style>
    body { font-family: Arial, sans-serif; }
    ul { list-style-type: none; }
    li { margin: 5px 0; cursor: pointer; }
    li:hover { background: #f0f0f0; }
  </style>
</head>
<body>
  <h2>Archivos del repositorio</h2>
  <ul id="file-list"></ul>

  <script>
    // Cambia estos valores por tu repo
    const owner = "gerismusikyt";      // ejemplo: "octocat"
    const repo = "uploads.for.thinks";   // ejemplo: "Hello-World"
    const branch = "main";        // rama principal

    async function fetchRepoContents(path = "") {
      const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`;
      const response = await fetch(url);
      const data = await response.json();

      const list = document.getElementById("file-list");
      list.innerHTML = "";

      data.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item.name;

        if (item.type === "dir") {
          li.style.fontWeight = "bold";
          li.onclick = () => fetchRepoContents(item.path);
        } else {
          li.onclick = () => {
            const publicLink = `https://github.com/${owner}/${repo}/blob/${branch}/${item.path}`;
            navigator.clipboard.writeText(publicLink);
            alert("Copiado: " + publicLink);
          };
        }

        list.appendChild(li);
      });
    }

    // Cargar raíz del repo
    fetchRepoContents();
  </script>
</body>
</html>
